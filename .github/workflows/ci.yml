name: CI

on:
  push:
    branches: [ main, feat/*, chore/*, fix/*]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test1234
          POSTGRES_DB: ecommerce_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      env:
        ENV: testing
        DATABASE_URL: postgresql+asyncpg://postgres:test1234@localhost:5432/ecommerce_db
        TEST_DATABASE_URL: postgresql+asyncpg://postgres:test1234@localhost:5432/ecommerce_test
        SECRET_KEY: test-secret-key-for-ci-only
        ALGORITHM: HS256
        ACCESS_TOKEN_EXPIRE_MINUTES: 15
        REFRESH_TOKEN_EXPIRE_DAYS: 7
        MAIL_FROM: noreply@example.com
        LOG_LEVEL: INFO
        LOG_DIR: logs
        REDIS_URL: redis://localhost:6379/0
      run: |
        pytest --disable-warnings -v -n 4

    - name: Check code quality (non-blocking)
      continue-on-error: true
      run: |
        pip install ruff
        ruff check .

      