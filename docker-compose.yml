services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ecommerce
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: localsecretkey
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      MAIL_USERNAME: ""
      MAIL_PASSWORD: ""
      MAIL_FROM: ""
      MAIL_SERVER: ""
      MAIL_PORT: 587
      LOG_LEVEL: INFO
      BASE_URL: http://localhost:8000
      CORS_ORIGINS: '["http://localhost:3000"]'
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
        
  worker:
    build: .
    command: celery -A core.celery_app worker --loglevel=info --concurrency=2
    environment:
      ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ecommerce
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: localsecretkey
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      MAIL_USERNAME: ""
      MAIL_PASSWORD: ""
      MAIL_FROM: ""
      MAIL_SERVER: ""
      MAIL_PORT: 587
      LOG_LEVEL: INFO
      BASE_URL: http://localhost:8000
      CORS_ORIGINS: '["http://localhost:3000"]'
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build: .
    command: celery -A core.celery_app beat --loglevel=info --schedule /tmp/celerybeat-schedule
    environment:
      ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ecommerce
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: localsecretkey
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      MAIL_USERNAME: ""
      MAIL_PASSWORD: ""
      MAIL_FROM: ""
      MAIL_SERVER: ""
      MAIL_PORT: 587
      LOG_LEVEL: INFO
      BASE_URL: http://localhost:8000
      CORS_ORIGINS: '["http://localhost:3000"]'
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
        
volumes:
  postgres_data: